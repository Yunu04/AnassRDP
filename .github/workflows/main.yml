jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: install and run tailscale
        run: |
          brew install tailscale
          sudo tailscale set --operator=$USER
          sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=macos-server --accept-routes
          
      - name: enable VNC
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -allUsers -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ github.event.inputs.password }}"
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
          
      - name: set password
        run: |
          sudo dscl . -passwd /Users/$(whoami) "${{ github.event.inputs.password }}"
          
      - name: show info
        run: |
          echo "IP: $(sudo tailscale ip -4)"
          echo "User: $(whoami)"
          echo "Pass: ${{ github.event.inputs.password }}"
          
      - name: keep alive
        run: while true; do sleep 300; done
