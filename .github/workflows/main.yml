name: github rdp tailscale edition
on:
  workflow_dispatch:
    inputs:
      password:
        description: 'set rdp password'
        required: true
        default: 'IITS@Maroc#2026'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: initializing environment
        run: echo "starting server deployment..."

      - name: installing tailscale
        run: |
          echo "downloading tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          echo "tailscale setup complete."

      - name: authenticating tailscale
        run: |
          echo "linking to tailscale network..."
          sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=cloud-ubuntu-server --accept-routes
          echo "authentication successful."

      - name: setting up remote desktop (xrdp)
        run: |
          echo "installing xrdp and xfce4 desktop environment..."
          sudo apt-get update
          sudo apt-get install -y xrdp xfce4 xfce4-goodies
          
          echo "configuring xrdp to use xfce4..."
          echo "xfce4-session" > ~/.xsession
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          
          echo "configuring firewall for rdp..."
          sudo ufw allow 3389/tcp
          echo "xrdp setup complete."

      - name: configuring user credentials
        run: |
          echo "setting up user credentials..."
          echo "runneradmin:${{ github.event.inputs.password }}" | sudo chpasswd
          
          # Allow password authentication for xrdp
          sudo sed -i 's/allow_blank_password=false/allow_blank_password=true/g' /etc/xrdp/xrdp.ini
          sudo systemctl restart xrdp
          
          echo "password configured."

      - name: installing additional tools
        run: |
          echo "installing useful tools..."
          sudo apt-get install -y htop nano curl wget net-tools
          echo "tools installation complete."

      - name: maintaining connection
        run: |
          echo "=========================================="
          echo "server is live"
          echo "username: runneradmin"
          echo "password: ${{ github.event.inputs.password }}"
          echo "internal ip address:"
          tailscale ip -4
          echo ""
          echo "to connect via rdp:"
          echo "use the tailscale ip address above with any rdp client"
          echo "port: 3389"
          echo "=========================================="
          while true; do
            echo "keep-alive: $(date)"
            sleep 300
          done
