name: github rdp tailscale edition
on:
  workflow_dispatch:
    inputs:
      password:
        description: 'set rdp password'
        required: true
        default: 'IITS@Maroc#2026'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: initializing environment
        run: echo "starting server deployment..."

      - name: installing tailscale
        run: |
          echo "downloading tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          echo "tailscale setup complete."

      - name: authenticating tailscale
        run: |
          echo "linking to tailscale network..."
          sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=cloud-ubuntu-server --accept-routes
          echo "authentication successful."

      - name: setting up remote desktop (xrdp)
        run: |
          echo "installing xrdp and xfce4 desktop environment..."
          sudo apt-get update
          sudo apt-get install -y xrdp xfce4 xfce4-goodies
          
          echo "configuring xrdp to use xfce4..."
          echo "xfce4-session" > ~/.xsession
          sudo systemctl enable xrdp
          sudo systemctl start xrdp
          
          echo "configuring firewall for rdp..."
          sudo ufw allow 3389/tcp
          echo "xrdp setup complete."

      - name: configuring user credentials
        run: |
          echo "setting up user credentials..."
          # Get the current username (runner on GitHub Actions Ubuntu)
          CURRENT_USER=$(whoami)
          echo "Current user: $CURRENT_USER"
          
          # Set password for the current user
          echo "$CURRENT_USER:${{ github.event.inputs.password }}" | sudo chpasswd
          
          # Also create a dedicated 'runneradmin' user if needed
          sudo useradd -m -s /bin/bash runneradmin -p "$(openssl passwd -1 '${{ github.event.inputs.password }}')" 2>/dev/null || echo "User may already exist"
          
          # Add user to necessary groups
          sudo usermod -aG sudo $CURRENT_USER
          sudo usermod -aG ssl-cert $CURRENT_USER
          
          # Configure xrdp to allow the user
          echo "$CURRENT_USER" | sudo tee -a /etc/xrdp/xrdp.ini
          
          # Allow password authentication for xrdp
          sudo sed -i 's/allow_blank_password=false/allow_blank_password=true/g' /etc/xrdp/xrdp.ini
          sudo sed -i 's/allow_blank_password=0/allow_blank_password=1/g' /etc/xrdp/xrdp.ini
          
          sudo systemctl restart xrdp
          echo "password configured for $CURRENT_USER"

      - name: installing additional tools
        run: |
          echo "installing useful tools..."
          sudo apt-get install -y htop nano curl wget net-tools
          echo "tools installation complete."

      - name: maintaining connection
        run: |
          CURRENT_USER=$(whoami)
          TAILSCALE_IP=$(tailscale ip -4)
          echo "=========================================="
          echo "✅ SERVER IS LIVE"
          echo "=========================================="
          echo "username: $CURRENT_USER"
          echo "password: ${{ github.event.inputs.password }}"
          echo ""
          echo "📡 Tailscale IP Address: $TAILSCALE_IP"
          echo ""
          echo "🔌 To connect via RDP:"
          echo "   - Use any RDP client (Remote Desktop Connection, Remmina, etc.)"
          echo "   - Server: $TAILSCALE_IP"
          echo "   - Port: 3389"
          echo "   - Username: $CURRENT_USER"
          echo "   - Password: [the password you set]"
          echo ""
          echo "⚠️  Note: First RDP connection may take a moment to start the desktop"
          echo "=========================================="
          
          # Keep the workflow alive
          while true; do
            echo "keep-alive: $(date) - Tailscale IP: $(tailscale ip -4)"
            sleep 300
          done
