name: github rdp tailscale edition (macOS)
on:
  workflow_dispatch:
    inputs:
      password:
        description: 'set remote access password'
        required: true
        default: 'IITS@Maroc#2026'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: initializing environment
        run: echo "starting server deployment..."

      - name: installing tailscale
        run: |
          echo "downloading tailscale..."
          curl -o tailscale.pkg 'https://pkgs.tailscale.com/stable/tailscale-setup-latest.pkg'
          echo "installing tailscale..."
          sudo installer -pkg tailscale.pkg -target /
          echo "waiting for service..."
          sleep 15
          echo "tailscale setup complete."

      - name: authenticating tailscale
        run: |
          echo "linking to tailscale network..."
          sudo /Applications/Tailscale.app/Contents/MacOS/Tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=cloud-mac-server --accept-routes
          echo "authentication successful."

      - name: enabling remote management (VNC/ARD)
        run: |
          echo "configuring remote access for macOS..."
          
          # Enable Screen Sharing (VNC)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvnclegacy -vnclegacy yes -restart -agent -privs -all
          
          # Set VNC password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -setvncpw -vncpw "${{ github.event.inputs.password }}"
          
          # Enable Remote Login (SSH)
          sudo systemsetup -setremotelogin on
          
          # Allow remote access for all users (or specify)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -allowAccessFor -allUsers
          
          # Open firewall ports for VNC (5900) and SSH (22)
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --add /System/Library/CoreServices/RemoteManagement/ARDAgent.app
          sudo /usr/libexec/ApplicationFirewall/socketfilterfw --unblock /System/Library/CoreServices/RemoteManagement/ARDAgent.app
          
          echo "remote access configured."

      - name: disabling password policies
        run: |
          echo "configuring macOS password policies..."
          # Disable automatic lock
          sudo defaults write /Library/Preferences/com.apple.screensaver askForPassword -bool false
          
          # Disable password requirements for remote access
          sudo pwpolicy -clearaccountpolicies
          
          # Set current user password
          echo "runneradmin:${{ github.event.inputs.password }}" | sudo chpasswd
          
          echo "password configuration complete."

      - name: configuring network settings
        run: |
          echo "optimizing network for remote access..."
          
          # Disable sleep
          sudo pmset -a displaysleep 0
          sudo pmset -a sleep 0
          
          # Disable power saving
          sudo systemsetup -setcomputersleep Never
          sudo systemsetup -setdisplaysleep Never
          sudo systemsetup -setharddisksleep Never
          
          # Enable SSH keep-alive
          echo "ClientAliveInterval 60" | sudo tee -a /etc/ssh/sshd_config
          echo "ClientAliveCountMax 3" | sudo tee -a /etc/ssh/sshd_config
          sudo launchctl unload /System/Library/LaunchDaemons/ssh.plist
          sudo launchctl load /System/Library/LaunchDaemons/ssh.plist
          
          echo "network optimization complete."

      - name: maintaining connection
        run: |
          echo "=========================================="
          echo "server is live (macOS)"
          echo "username: runneradmin"
          echo "password: ${{ github.event.inputs.password }}"
          echo ""
          echo "connection methods:"
          echo "- SSH: ssh runneradmin@[tailscale-ip]"
          echo "- VNC: vnc://[tailscale-ip] (use same password)"
          echo ""
          echo "tailscale internal ip address:"
          /Applications/Tailscale.app/Contents/MacOS/Tailscale ip -4
          echo "=========================================="
          while true; do
            echo "keep-alive: $(date)"
            sleep 300
          done
