name: macOS Server - Working Windows Access
on:
  workflow_dispatch:
    inputs:
      password:
        description: 'VNC/SSH Password'
        required: true
        default: 'IITS@Maroc#2026'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale
        run: |
          # Install using Homebrew
          brew install tailscale
          
          # Kill existing tailscaled if running
          sudo pkill tailscaled || true
          
          # Start tailscaled fresh
          sudo /opt/homebrew/opt/tailscale/bin/tailscaled --state=/var/lib/tailscale/tailscaled.state &
          
          # Wait for tailscaled to start
          sleep 5
          
          # Now connect to Tailscale
          sudo /opt/homebrew/bin/tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=macos-server --accept-routes
          
          # Show status
          sudo /opt/homebrew/bin/tailscale status

      - name: Setup Remote Desktop Access
        run: |
          # Enable SSH
          sudo systemsetup -setremotelogin on
          
          # Kill existing ARD Agent
          sudo pkill ARDAgent || true
          
          # Enable Screen Sharing (VNC) with password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvnclegacy -vnclegacy yes -restart -agent -privs -all
          
          # Set VNC password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -setvncpw -vncpw "${{ github.event.inputs.password }}"
          
          # Set user password - FIXED METHOD
          sudo dscl /Local/Default -passwd /Users/runneradmin "${{ github.event.inputs.password }}"
          
          # Disable sleep and power saving
          sudo pmset -a sleep 0
          sudo pmset -a disksleep 0
          sudo pmset -a displaysleep 0
          sudo systemsetup -setcomputersleep Never
          
          echo "✅ Remote access configured"

      - name: Verify Services
        run: |
          echo "Checking Tailscale status..."
          sudo /opt/homebrew/bin/tailscale status
          
          echo ""
          echo "Checking SSH status..."
          sudo systemsetup -getremotelogin
          
          echo ""
          echo "Getting Tailscale IP..."
          TS_IP=$(sudo /opt/homebrew/bin/tailscale ip -4)
          echo "IP Address: $TS_IP"
          
          echo ""
          echo "Testing SSH connection..."
          ssh -o ConnectTimeout=5 runneradmin@localhost echo "SSH works" || echo "SSH test failed"

      - name: Get Connection Information
        run: |
          # Get Tailscale IP
          TS_IP=$(sudo /opt/homebrew/bin/tailscale ip -4)
          
          echo ""
          echo "=========================================="
          echo "🍎 macOS SERVER IS READY"
          echo "=========================================="
          echo ""
          echo "📡 TAILSCALE IP: $TS_IP"
          echo "👤 USERNAME: runneradmin"
          echo "🔑 PASSWORD: ${{ github.event.inputs.password }}"
          echo ""
          echo "=========================================="
          echo "🪟 CONNECT FROM WINDOWS"
          echo "=========================================="
          echo ""
          echo "1️⃣ Install Tailscale on Windows:"
          echo "   https://tailscale.com/download/windows"
          echo ""
          echo "2️⃣ SSH Connection (PowerShell or CMD):"
          echo "   ssh runneradmin@$TS_IP"
          echo "   Password: ${{ github.event.inputs.password }}"
          echo ""
          echo "3️⃣ VNC Connection (Full Desktop):"
          echo "   Download TightVNC: https://www.tightvnc.com/download.php"
          echo "   Server: $TS_IP"
          echo "   Password: ${{ github.event.inputs.password }}"
          echo ""
          echo "=========================================="
          
          # Save to file
          cat > ~/connection_info.txt << EOF
          macOS Server Connection Info
          =============================
          IP: $TS_IP
          User: runneradmin
          Pass: ${{ github.event.inputs.password }}
          SSH: ssh runneradmin@$TS_IP
          VNC: vnc://$TS_IP
          EOF

      - name: Keep Server Alive
        run: |
          echo "🟢 Server is running. Keep this workflow running to maintain access."
          echo ""
          echo "Press Ctrl+C to stop the server"
          echo ""
          
          while true; do
            TS_IP=$(sudo /opt/homebrew/bin/tailscale ip -4 2>/dev/null || echo "waiting...")
            echo "[$(date '+%H:%M:%S')] 🟢 Server alive - IP: $TS_IP"
            sleep 60
          done
