name: github macos server (access from windows)
on:
  workflow_dispatch:
    inputs:
      password:
        description: 'set vnc/ssh password'
        required: true
        default: 'IITS@Maroc#2026'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: installing tailscale
        run: |
          # Install Tailscale via Homebrew
          brew install tailscale
          
          # Start and authenticate Tailscale
          sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=macos-server --accept-routes
          
          echo "Tailscale connected"

      - name: enabling remote access from windows
        run: |
          # Enable SSH (for Windows SSH clients like PuTTY, Windows Terminal)
          sudo systemsetup -setremotelogin on
          
          # Enable VNC/Screen Sharing (for Windows VNC clients)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate \
            -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -restart -agent -privs -all
          
          # Set VNC password (used by Windows VNC clients)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -setvncpw -vncpw "${{ github.event.inputs.password }}"
          
          # Set user password for authentication
          sudo dscl . -passwd /Users/runneradmin "${{ github.event.inputs.password }}"
          
          # Disable sleep
          sudo pmset -a sleep 0
          sudo systemsetup -setcomputersleep Never

      - name: display connection info
        run: |
          TS_IP=$(tailscale ip -4)
          
          echo "=========================================="
          echo "🍎 macOS SERVER IS READY"
          echo "=========================================="
          echo ""
          echo "📡 TAILSCALE IP: $TS_IP"
          echo "👤 USERNAME: runneradmin"
          echo "🔑 PASSWORD: ${{ github.event.inputs.password }}"
          echo ""
          echo "🪟 HOW TO CONNECT FROM WINDOWS:"
          echo ""
          echo "1️⃣ SSH CONNECTION (Command Prompt or PowerShell):"
          echo "   ssh runneradmin@$TS_IP"
          echo "   (Then enter the password)"
          echo ""
          echo "2️⃣ VNC CONNECTION (Remote Desktop to macOS):"
          echo "   - Download TightVNC or RealVNC on Windows"
          echo "   - Connect to: $TS_IP"
          echo "   - Password: ${{ github.event.inputs.password }}"
          echo ""
          echo "3️⃣ USING PUTTY (Windows SSH client):"
          echo "   - Host: $TS_IP"
          echo "   - Username: runneradmin"
          echo "   - Password: ${{ github.event.inputs.password }}"
          echo ""
          echo "=========================================="

      - name: keep connection alive
        run: |
          while true; do
            echo "[ALIVE] macOS server running - $(date)"
            sleep 300
          done
