name: macOS Server - Homebrew Method
on:
  workflow_dispatch:
    inputs:
      password:
        description: 'Password for VNC/SSH access'
        required: true
        default: 'IITS@Maroc#2026'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install Tailscale
        run: |
          # Install using Homebrew
          brew install tailscale
          
          # Start the Tailscale service
          sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=macos-server --accept-routes
          
          # Show status
          sudo tailscale status

      - name: Setup Remote Desktop
        run: |
          # Enable SSH
          sudo systemsetup -setremotelogin on
          
          # Enable Screen Sharing (VNC)
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvnclegacy -vnclegacy yes -restart -agent -privs -all
          
          # Set VNC password
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -setvncpw -vncpw "${{ github.event.inputs.password }}"
          
          # Set user password
          sudo dscl . -passwd /Users/runneradmin "${{ github.event.inputs.password }}"
          
          # Disable sleep
          sudo pmset -a sleep 0

      - name: Get Connection Details
        run: |
          IP=$(sudo tailscale ip -4)
          
          echo "========================================="
          echo "🍎 MACOS SERVER ACTIVE"
          echo "========================================="
          echo "IP Address: $IP"
          echo "Username: runneradmin"
          echo "Password: ${{ github.event.inputs.password }}"
          echo "========================================="
          echo "SSH: ssh runneradmin@$IP"
          echo "VNC: vnc://$IP (use TightVNC on Windows)"
          echo "========================================="

      - name: Keep Running
        run: |
          echo "Server will stay active until cancelled"
          while true; do
            echo "✅ Server alive - $(date)"
            sleep 300
          done
