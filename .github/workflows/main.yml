name: macOS Server - FINAL WORKING
on:
  workflow_dispatch:
    inputs:
      password:
        description: 'VNC Password'
        required: true
        default: 'IITS@Maroc#2026'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install and Setup Tailscale
        run: |
          brew install tailscale
          sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=macos-server
          
      - name: Enable Remote Access
        run: |
          # Enable SSH
          sudo systemsetup -setremotelogin on
          
          # Enable VNC
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -clientopts -setvnclegacy -vnclegacy yes -restart -agent -privs -all
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -configure -setvncpw -vncpw "${{ github.event.inputs.password }}"
          
          # Disable sleep
          sudo pmset -a sleep 0
          
      - name: Display Connection Info
        run: |
          IP=$(tailscale ip -4)
          echo "=========================================="
          echo "✅ MACOS SERVER IS READY"
          echo "=========================================="
          echo "IP Address: $IP"
          echo "Username: runneradmin"
          echo "VNC Password: ${{ github.event.inputs.password }}"
          echo ""
          echo "🔌 TO CONNECT FROM WINDOWS:"
          echo "1. Install Tailscale on Windows"
          echo "2. SSH: ssh runneradmin@$IP"
          echo "3. VNC: Download TightVNC, connect to $IP"
          echo "   Password: ${{ github.event.inputs.password }}"
          echo "=========================================="
          
      - name: Keep Alive
        run: while true; do sleep 300; done
